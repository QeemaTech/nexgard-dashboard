<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>NexApp Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var storedTheme = localStorage.getItem("nex-dashboard-theme");
        var theme =
          storedTheme === "dark" || storedTheme === "light"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        var locale = localStorage.getItem("nex-dashboard-locale") || "en";
        var root = document.documentElement;
        root.dataset.theme = theme;
        root.style.colorScheme = theme === "dark" ? "dark" : "light";
        root.classList.remove("dark", "light");
        root.classList.add(theme === "dark" ? "dark" : "light");
        root.lang = locale;
        root.dir = locale === "ar" ? "rtl" : "ltr";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
